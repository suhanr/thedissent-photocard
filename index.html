<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dissent - Photocard Maker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
      
        body {
            font-family: 'Noto Serif Bengali', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f4f9;
            margin: 0;
            padding: 20px;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .controls {
            flex: 1;
            min-width: 300px;
            max-width: 400px;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            height: fit-content;
        }

        .controls h2 {
            margin-top: 0;
            font-size: 30px;
            color: #333;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: 600;
            color: lch(0% 0 0);
            font-size: 20px;
        }

        input[type="text"],
        input[type="file"],
        textarea {
            width: 100%;
            padding: 10px;
            font-size: 18px;
            margin-top: 5px;
            border: 1px solid #9a9999;
            border-radius: 5px;
            box-sizing: border-box;
            font-family: inherit;
        }

        textarea {
            height: 100px;
            font-size: 18px;
            resize: vertical;
        }

        .help-text {
            font-size: 15px;
            color: #e95e02;
            margin-top: 5px;
            font-weight: 600;
            display: block;
            line-height: 1.3;
        }

        button {
            margin-top: 25px;
            font-family: 'Noto Serif Bengali', sans-serif;
            padding: 12px;
            width: 100%;
            background: #2A2A2A;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #444;
        }

        .preview-wrapper {
            flex: 2;
            min-width: 350px;
            display: flex;
            padding-top: 50px;
            justify-content: center;
            align-items: flex-start;
            overflow: hidden;
        }

        #photocard {
            width: 1080px;
            height: 1080px;
            background-color: #2b2b2d;
            position: relative;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            transform: scale(0.5);
            transform-origin: top center;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
        }

        .image-container {
            width: 1080px;
            height: 600px;
            background: white;
            position: relative;
            overflow: hidden;
        }

        .draggable-image {
            position: absolute;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            cursor: move;
            z-index: 1;
            min-width: 50px;
            min-height: 50px;
            box-sizing: border-box;
        }

        .draggable-image:hover {
            border: 3px dashed #007bff;
            z-index: 10;
        }

        .resize-handle {
            width: 16px;
            height: 16px;
            background: #007bff;
            border: 2px solid white;
            border-radius: 50%;
            position: absolute;
            display: none;
            z-index: 6;
        }

        .draggable-image:hover .resize-handle {
            display: block;
        }

        .nw { top: -8px; left: -8px; cursor: nwse-resize; }
        .ne { top: -8px; right: -8px; cursor: nesw-resize; }
        .sw { bottom: -8px; left: -8px; cursor: nesw-resize; }
        .se { bottom: -8px; right: -8px; cursor: nwse-resize; }

        .delete-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #ff4757;
            color: white;
            width: 25px;
            height: 25px;
            text-align: center;
            line-height: 23px;
            border-radius: 50%;
            cursor: pointer;
            font-family: sans-serif;
            font-weight: bold;
            font-size: 14px;
            display: none;
            z-index: 5;
        }

        .draggable-image:hover .delete-btn {
            display: block;
        }

        #photocard.exporting .draggable-image {
            border: none !important;
        }

        #photocard.exporting .resize-handle,
        #photocard.exporting .delete-btn {
            display: none !important;
        }

        .middle-bar {
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            padding-top: 20px;
            padding-bottom: 5px;
            color: white;
            font-family: 'Noto Serif Bengali', serif;
        }

        .category {
            font-size: 35px;
            font-weight: 500;
            width: 30%;
            white-space: nowrap;
        }

        .logo-area {
            width: 40%;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-area img {
            height: 50px;
            max-width: 100%;
        }

        .date {
            font-size: 35px;
            font-weight: 500;
            width: 30%;
            text-align: right;
            white-space: nowrap;
        }

        .text-block {
            background-color: #38383a;
            margin: 10px 0px;
            padding: 30px;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.2);
        }

        .main-text {
            font-family: 'Noto Serif Bengali', serif;
            font-size: 63px;
            color: white;
            line-height: 1.1;
            font-weight: 600;
            padding-left: 75px;
            padding-right: 75px;

        }

        .text-yellow {
            color: #f1f226;
        }

        .footer {
            height: 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 10px 40px 10px 40px;
            color: white;
            font-size: 22px;
            font-family: 'Segoe UI', sans-serif;
        }

        .footer span {
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>

<body>

    <div class="controls">
        <h2>ফটোকার্ড জেনারেটর</h2>

        <label>সোর্স ছবি আপলোড করুন</label>
        <input type="file" id="imgUpload" accept="image/*" multiple>
        <span class="help-text">💡 <b>একাধিক ছবি</b> সিলেক্ট করতে পারবেন। ছবির উপর ক্লিক করে টেনে পজিশন ঠিক করুন এবং যেকোনো কোণায় ধরে ছোট-বড় করুন।</span>

        <label>ক্যাটেগরি</label>
        <input type="text" id="catInput" placeholder="যেমন: ডিজিটাল ইনভেস্টিগেশন">

        <label>তারিখ</label>
        <input type="text" id="dateInput" placeholder="এভাবে লিখুনঃ তারিখ: ২০/০৮/২০২৩">

        <label>টাইটেল টেক্সট</label>
        <textarea id="textInput" placeholder="আজহারী ও আহমাদুল্লাহর ভিসা বাতিলের পেছনে *অস্ট্রেলিয়ার আওয়ামী সংশ্লিষ্ট নেটওয়ার্ক*"></textarea>
        <span class="help-text">💡 যে লেখা হলুদ করতে চান তার দুই পাশে * দিন। (যেমন: *হ্যালো*)</span>

        <button onclick="downloadPhotocard()">ডাউনলোড করুন</button>
    </div>

    <div class="preview-wrapper">
        <div id="photocard">

            <div class="image-container" id="imageContainer">
            </div>

            <div class="middle-bar">
                <div class="category" id="catDisplay">ডিজিটাল ইনভেস্টিগেশন</div>
                <div class="logo-area">
                    <img src="logo.png">
                </div>
                <div class="date" id="dateDisplay">তারিখ: ২০/০৪/২০২৬</div>
            </div>

            <div class="text-block">
                <div class="main-text" id="textDisplay"></div>
            </div>

            <div class="footer">
                <span><img crossorigin="anonymous" src="https://img.icons8.com/?size=100&id=118467&format=png&color=FFFFFF" style="width:35px">TheDissent</span>
                <span><img crossorigin="anonymous" src="https://img.icons8.com/?size=100&id=rhvV5hIsMYPE&format=png&color=FFFFFF" style="width:35px">thedissent.news</span>
            </div>
        </div>
    </div>

    <script>
        const textInput = document.getElementById('textInput');
        const textDisplay = document.getElementById('textDisplay');
        const catInput = document.getElementById('catInput');
        const catDisplay = document.getElementById('catDisplay');
        const dateInput = document.getElementById('dateInput');
        const dateDisplay = document.getElementById('dateDisplay');
        const imgUpload = document.getElementById('imgUpload');
        const imageContainer = document.getElementById('imageContainer');

        function updateText() {
            let rawText = textInput.value;
            let formattedText = rawText.replace(/\*(.*?)\*/g, '<span class="text-yellow">$1</span>');
            formattedText = formattedText.replace(/\n/g, '<br>');
            textDisplay.innerHTML = formattedText;
        }

        textInput.addEventListener('input', updateText);
        catInput.addEventListener('input', () => catDisplay.textContent = catInput.value);
        dateInput.addEventListener('input', () => dateDisplay.textContent = dateInput.value);
        updateText();

        imgUpload.addEventListener('change', function (e) {
            const files = e.target.files;
            if (files) {
                Array.from(files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = function (event) {
                        createDraggableImage(event.target.result);
                    }
                    reader.readAsDataURL(file);
                });
            }
            this.value = '';
        });

        function createDraggableImage(src) {
            const wrapper = document.createElement('div');
            wrapper.className = 'draggable-image drag-handle';
            wrapper.style.width = '400px';
            wrapper.style.height = '400px';
            wrapper.style.left = '50px';
            wrapper.style.top = '50px';
            wrapper.style.backgroundImage = `url(${src})`; 

            const handles = ['nw', 'ne', 'sw', 'se'];
            handles.forEach(pos => {
                const handle = document.createElement('div');
                handle.className = `resize-handle ${pos}`;
                wrapper.appendChild(handle);
            });

            const delBtn = document.createElement('div');
            delBtn.className = 'delete-btn';
            delBtn.innerHTML = '✕';
            delBtn.onclick = (e) => {
                e.stopPropagation(); 
                wrapper.remove();
            }

            wrapper.appendChild(delBtn);
            imageContainer.appendChild(wrapper);
        }

        let isDragging = false;
        let isResizing = false;
        let currentElement = null;
        let currentHandle = null;
        let startX, startY, initialLeft, initialTop, startW, startH;
        const scale = 0.5;

        document.addEventListener('mousedown', (e) => {
            if (e.target.classList.contains('resize-handle')) {
                isResizing = true;
                currentHandle = e.target;
                currentElement = e.target.closest('.draggable-image');
                startX = e.clientX;
                startY = e.clientY;
                initialLeft = currentElement.offsetLeft;
                initialTop = currentElement.offsetTop;
                startW = currentElement.offsetWidth;
                startH = currentElement.offsetHeight;

                document.querySelectorAll('.draggable-image').forEach(el => el.style.zIndex = '1');
                currentElement.style.zIndex = '10';
                e.preventDefault();
                e.stopPropagation();
            } else if (e.target.classList.contains('drag-handle')) {
                isDragging = true;
                currentElement = e.target;
                startX = e.clientX;
                startY = e.clientY;
                initialLeft = currentElement.offsetLeft;
                initialTop = currentElement.offsetTop;

                document.querySelectorAll('.draggable-image').forEach(el => el.style.zIndex = '1');
                currentElement.style.zIndex = '10';
                e.preventDefault();
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (isResizing && currentElement) {
                const dx = (e.clientX - startX) / scale;
                const dy = (e.clientY - startY) / scale;

                let newW = startW, newH = startH, newL = initialLeft, newT = initialTop;

                if (currentHandle.classList.contains('se')) {
                    newW = startW + dx;
                    newH = startH + dy;
                } else if (currentHandle.classList.contains('sw')) {
                    newW = startW - dx;
                    newH = startH + dy;
                    newL = initialLeft + dx;
                } else if (currentHandle.classList.contains('ne')) {
                    newW = startW + dx;
                    newH = startH - dy;
                    newT = initialTop + dy;
                } else if (currentHandle.classList.contains('nw')) {
                    newW = startW - dx;
                    newH = startH - dy;
                    newL = initialLeft + dx;
                    newT = initialTop + dy;
                }

                if (newW > 50) {
                    currentElement.style.width = newW + 'px';
                    currentElement.style.left = newL + 'px';
                }
                if (newH > 50) {
                    currentElement.style.height = newH + 'px';
                    currentElement.style.top = newT + 'px';
                }
            } else if (isDragging && currentElement) {
                const dx = (e.clientX - startX) / scale;
                const dy = (e.clientY - startY) / scale;
                currentElement.style.left = (initialLeft + dx) + 'px';
                currentElement.style.top = (initialTop + dy) + 'px';
            }
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
            isResizing = false;
            currentElement = null;
            currentHandle = null;
        });

        // ফন্ট লোড হওয়ার জন্য একটু সময় দিয়ে ডাউনলোড কল করা ভালো
        function downloadPhotocard() {
            document.fonts.ready.then(() => {
                const photocard = document.getElementById('photocard');
                const originalTransform = photocard.style.transform;

                photocard.style.transform = 'none';
                photocard.classList.add('exporting');

                html2canvas(photocard, {
                    scale: 2,
                    useCORS: true,
                    allowTaint: true,
                    backgroundColor: '#2b2b2d'
                }).then(canvas => {
                    photocard.style.transform = originalTransform;
                    photocard.classList.remove('exporting');

                    const link = document.createElement('a');
                    link.download = `TheDissent_Photocard_${new Date().getTime()}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                });
            });
        }
    </script>
</body>

</html>
