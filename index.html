<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dissent - Photocard Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="side-panel left-panel">
        <h1 class="header-title">Photocard Studio</h1>
        <div class="panel-card">
            <h3 class="card-header">📝 বেসিক তথ্য</h3>
            <label>ক্যাটেগরি</label>
            <input type="text" id="catInput" placeholder="যেমন: ডিজিটাল ইনভেস্টিগেশন">
            <label>তারিখ নির্বাচন করুন</label>
            <input type="date" id="dateInput" style="font-family: inherit;">
        </div>

        <div class="panel-card">
            <h3 class="card-header">✍️ হেডিং ও টেক্সট</h3>
            <label>টাইটেল টেক্সট <span style="font-weight:normal; color:#515050; font-size:14px;">(হলুদ করতে লেখার
                    দুইপাশে * দিন। যেমনঃ *হ্যালো*)</span></label>
            <textarea id="textInput"
                placeholder="সন্দেহজনক ওয়েবসাইটকে ‘মার্কিন গণমাধ্যম’ সাজিয়ে *ভুয়া তথ্য ছড়াচ্ছে আ.লীগ*"></textarea>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top:15px;">
                <label style="margin:0;">সাবহেডিং (মেইন টেক্সটের উপরে)</label>
                <input type="color" id="subTextColor" value="#e0e0e0" title="সাবহেডিং কালার">
            </div>
            <textarea id="subTextInput" placeholder="সন্দেহজনক ওয়েবসাইটকে *মার্কিন গণমাধ্যম*"
                style="height: 70px; margin-top: 8px;"></textarea>
        </div>
    </div>


    <div class="preview-wrapper" id="previewWrapper">
        <div id="photocard" onclick="handleCanvasClick(event)">
            <div class="image-container" id="imageContainer"></div>
            <div class="middle-bar">
                <div class="category" id="catDisplay">ডিজিটাল ইনভেস্টিগেশন</div>
                <div class="logo-area"><img src="logo.png"></div>
                <div class="date" id="dateDisplay">তারিখ: </div>
            </div>
            <div class="text-block">
                <div class="sub-text" id="subTextDisplay"></div>
                <div class="main-text" id="textDisplay"></div>
            </div>

            <div class="footer">
                <span><img crossorigin="anonymous"
                        src="https://img.icons8.com/?size=100&id=118467&format=png&color=FFFFFF" style="width:35px">The
                    Dissent</span>
                <span><img crossorigin="anonymous"
                        src="https://img.icons8.com/?size=100&id=rhvV5hIsMYPE&format=png&color=FFFFFF"
                        style="width:35px">thedissent.news</span>
            </div>
        </div>
    </div>


    <div class="side-panel right-panel">
        <div class="panel-card">
            <h3 class="card-header">🧩 এলিমেন্টস যুক্ত করুন</h3>
            <label style="margin-top:0;">ছবি আপলোড করুন</label>
            <input type="file" id="imgUpload" accept="image/*" multiple>
            <label style="margin-top: 20px;">শেপ ও স্টিকার</label>
            <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                <button type="button" class="format-btn" onclick="addShape('square')">⬛ স্কয়ার </button>
                <button type="button" class="format-btn" onclick="addShape('circle')">⚫ সার্কেল</button>
                <button type="button" class="format-btn" onclick="addShape('line')">➖ লাইন</button>
                <select id="stickerSelect" class="format-btn" onchange="addSticker(this.value); this.value='';"
                    style="width: auto; padding: 8px;">
                    <option value="">স্টিকার...</option>
                    <option value="⭐">⭐ স্টার</option>
                    <option value="🔥">🔥 ফায়ার</option>
                    <option value="📌">📌 পিন</option>
                    <option value="💡">💡 আইডিয়া</option>
                    <option value="⚠️">⚠️ এলার্ট</option>
                    <option value="✅">✅ টিক</option>
                    <option value="❌">❌ ক্রস</option>
                </select>
            </div>

            <label style="margin-top: 20px;">কাস্টম টেক্সট</label>
            <button type="button" class="btn-primary"
                style="margin-top: 5px; background: var(--bg-gradient); color: var(--primary-text); border: 1px solid var(--input-border); box-shadow: none;"
                onclick="addCustomText()">
                + নতুন কাস্টম টেক্সট
            </button>
        </div>
        <button class="btn-accent" onclick="downloadPhotocard()">📥 ফটোকার্ড ডাউনলোড করুন</button>
    </div>


    <div id="advancedPanel" class="popup-panel">
        <h3 class="card-header drag-handle-popup" id="popupHeader"
            style="color: var(--primary-text); font-size: 20px; justify-content: space-between; margin-bottom: 20px;">
            <span style="pointer-events: none;">🎨 প্রোপার্টিজ (Drag me)</span>
            <span
                style="font-size: 14px; font-weight: normal; cursor:pointer; color:var(--danger); background:rgba(255,0,0,0.1); padding:4px 10px; border-radius:12px;"
                onclick="closePopup()">✕ বন্ধ</span>
        </h3>


        <div id="textControls"
            style="display: none; margin-bottom:15px; border-bottom:1px solid rgba(0,0,0,0.05); padding-bottom:15px;">
            <textarea id="editActiveText" style="height: 60px; margin-bottom: 12px; font-size:14px;"
                placeholder="টেক্সট এডিট করুন..."></textarea>
            <div style="display: flex; gap: 6px; margin-bottom: 15px;">
                <button type="button" class="format-btn" onclick="formatActiveText('bold')"><b>B</b></button>
                <button type="button" class="format-btn" onclick="formatActiveText('italic')"><i>I</i></button>
                <button type="button" class="format-btn" onclick="formatActiveText('left')">Left</button>
                <button type="button" class="format-btn" onclick="formatActiveText('center')">Center</button>
                <button type="button" class="format-btn" onclick="formatActiveText('right')">Right</button>
            </div>
            <div style="display: flex; gap: 15px; align-items:center;">
                <label style="margin:0; font-size: 14px; display:flex; align-items:center; gap:8px; cursor:pointer;">
                    <input type="checkbox" id="toggleShadow" onchange="applyTextEffects()"> শ্যাডো
                </label>
                <label style="margin:0; font-size: 14px; display:flex; align-items:center; gap:8px; cursor:pointer;">
                    <input type="checkbox" id="toggleOutline" onchange="applyTextEffects()"> আউটলাইন
                </label>
            </div>
        </div>

        <div style="display: flex; gap: 20px; margin-bottom: 20px;">
            <div style="flex: 1;" id="colorControlDiv">
                <label style="margin-top:0;">কালার</label>
                <input type="color" id="propColor">
            </div>
            <div style="flex: 1;" id="bgControlDiv">
                <label style="margin-top:0;">ব্যাকগ্রাউন্ড</label>
                <div style="display: flex; align-items:center; gap:10px;">
                    <input type="color" id="propBg">
                    <label
                        style="margin:0; font-size: 12px; display:flex; align-items:center; gap:5px; cursor:pointer;">
                        <input type="checkbox" id="propBgTrans" style="width:24px; height:14px;"> ট্রান্সপারেন্ট
                    </label>
                </div>
            </div>
        </div>

        <div class="prop-row" id="borderControlDiv"
            style="display: none; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom:15px; margin-bottom:15px;">
            <div style="width: 100%;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <label style="margin:0;">ছবির বর্ডার</label>
                    <label style="margin:0;padding-left:160px;">বর্ডার কালার</label>
                    <input type="color" id="propBorderColor" value="#ffffff"
                        style="width: 30px; height: 30px; padding: 0; border: none;">
                </div>
                <div style="display:flex; align-items:center; gap:10px;">
                    <input type="range" id="propBorderWidth" min="0" max="50" value="0">
                    <span id="propBorderWidthVal" style="font-size:12px; width:35px; text-align:right;">0px</span>
                </div>
            </div>
        </div>

        <div class="prop-row" id="fontSizeControlDiv">
            <label style="margin:0;">সাইজ</label>
            <div style="width: 65%; display:flex; align-items:center; gap:10px;">
                <input type="range" id="propFontSize" min="10" max="250" value="40">
                <span id="propFontSizeVal" style="font-size:12px; width:35px; text-align:right;">40px</span>
            </div>
        </div>

        <div class="prop-row">
            <label style="margin:0;">ট্রান্সপারেন্সি</label>
            <div style="width: 65%; display:flex; align-items:center; gap:10px;">
                <input type="range" id="propOpacity" min="0" max="100" value="100">
                <span id="propOpacityVal" style="font-size:12px; width:35px; text-align:right;">100%</span>
            </div>
        </div>

        <div class="prop-row">
            <label style="margin:0;">রোটেশন</label>
            <div style="width: 65%; display:flex; align-items:center; gap:10px;">
                <input type="range" id="propRotate" min="0" max="360" value="0">
                <span id="propRotateVal" style="font-size:12px; width:35px; text-align:right;">0°</span>
            </div>
        </div>

        <div class="prop-row" id="radiusControlDiv">
            <label style="margin:0;">বর্ডার রাউন্ড (Radius)</label>
            <div style="width: 65%; display:flex; align-items:center; gap:10px;">
                <input type="range" id="propRadius" min="0" max="200" value="0">
                <span id="propRadiusVal" style="font-size:12px; width:35px; text-align:right;">0px</span>
            </div>
        </div>

        <div style="margin-top: 20px; padding-top:15px; border-top: 1px solid rgba(0,0,0,0.05);">
            <label style="margin-top:0;">পজিশন (Layering)</label>
            <div style="display: flex; gap: 8px;">
                <button type="button" class="format-btn" onclick="adjustLayer(1)">⬆️ সামনে আনুন</button>
                <button type="button" class="format-btn" onclick="adjustLayer(-1)">⬇️ পেছনে পাঠান</button>
            </div>
        </div>
    </div>


    <div id="cropModalOverlay" class="crop-overlay"></div>
    <div id="cropModal" class="popup-panel" style="max-width: 600px; padding: 20px;">
        <h3 class="card-header"
            style="color: var(--primary-text); font-size: 20px; justify-content: space-between; margin-bottom: 15px;">
            ✂️ ক্রপ ছবি
            <span
                style="font-size: 14px; font-weight: normal; cursor:pointer; color:var(--danger); background:rgba(255,0,0,0.1); padding:4px 10px; border-radius:12px;"
                onclick="closeCropModal()">✕ বাতিল</span>
        </h3>
        <div
            style="max-height: 400px; width: 100%; overflow: hidden; margin-bottom: 15px; background: #e2e8f0; border-radius: 8px;">
            <img id="cropTargetImage" style="max-width: 100%; display: block;">
        </div>
        <button type="button" class="btn-accent" onclick="applyCrop()">✅ এপ্লাই ক্রপ</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
