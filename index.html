<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dissent - Photocard Maker</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body {
            font-family: 'Noto Serif Bengali', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f4f9;
            margin: 0;
            padding: 20px;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .controls {
            flex: 1;
            min-width: 300px;
            max-width: 400px;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            height: fit-content;
        }

        .controls h2 { margin-top: 0; font-size: 30px; color: #333; }
        label { display: block; margin-top: 15px; font-weight: 600; color: lch(0% 0 0); font-size: 20px; }
        input[type="text"], input[type="file"], textarea {
            width: 100%; padding: 10px; font-size: 18px; margin-top: 5px; border: 1px solid #9a9999; border-radius: 5px; box-sizing: border-box; font-family: inherit;
        }
        textarea { height: 100px; font-size: 18px; resize: vertical; }
        .help-text { font-size: 15px; color: #e95e02; margin-top: 5px; font-weight: 600; display: block; line-height: 1.3; }
        
        button {
            margin-top: 25px; font-family: "Noto Serif Bengali"; padding: 12px; width: 100%; background: #2A2A2A; color: white; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        button:hover { background: #444; }

        .preview-wrapper {
            flex: 2;
            min-width: 350px;
            display: flex;
            padding-top: 20px;
            justify-content: center;
            align-items: flex-start;
            overflow: hidden;
            position: relative;
        }

        #photocard {
            width: 1080px;
            height: 1080px;
            background-color: #2b2b2d;
            position: relative;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            transform-origin: top left;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
        }

        .image-container {
            width: 1080px;
            height: 600px;
            background: white;
            position: relative;
            overflow: hidden;
        }

        .draggable-image {
            position: absolute;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            cursor: move;
            z-index: 1;
            min-width: 50px;
            min-height: 50px;
            box-sizing: border-box;
        }

        .draggable-image:hover { border: 3px dashed #007bff; z-index: 10; }

        .resize-handle {
            width: 25px;
            height: 25px;
            background: #007bff;
            border: 2px solid white;
            border-radius: 50%;
            position: absolute;
            display: none;
            z-index: 6;
        }

        .draggable-image:hover .resize-handle { display: block; }
        .nw { top: -12px; left: -12px; cursor: nwse-resize; }
        .ne { top: -12px; right: -12px; cursor: nesw-resize; }
        .sw { bottom: -12px; left: -12px; cursor: nesw-resize; }
        .se { bottom: -12px; right: -12px; cursor: nwse-resize; }

        .delete-btn {
            position: absolute; top: 10px; right: 10px; background: #ff4757; color: white; width: 30px; height: 30px; text-align: center; line-height: 28px; border-radius: 50%; cursor: pointer; font-family: sans-serif; font-weight: bold; font-size: 16px; display: none; z-index: 5;
        }

        .draggable-image:hover .delete-btn { display: block; }

        #photocard.exporting .draggable-image { border: none !important; }
        #photocard.exporting .resize-handle, #photocard.exporting .delete-btn { display: none !important; }

        .middle-bar {
            height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; padding-top: 20px; padding-bottom: 5px; color: white; font-family: 'Noto Serif Bengali', serif;
        }

        .category { font-size: 30px; font-weight: 600; width: 30%; white-space: nowrap; }
        
        .logo-area {
            width: 40%;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .logo-area img {
            height: 50px;
            max-width: 100%;
        }

        .date { font-size: 30px; font-weight: 600; width: 30%; text-align: right; white-space: nowrap; }

        .text-block {
            background-color: #38383a; margin: 10px 0px; padding: 30px; flex-grow: 1; display: flex; align-items: center; justify-content: center; text-align: center; box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.2);
        }

        .main-text { font-family: 'Noto Serif Bengali', serif; font-size: 58px; color: white; line-height: 1.4; font-weight: 700; }
        .text-yellow { color: #FFD700; }

        .footer {
            height: 40px; display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 40px 10px 40px; color: white; font-size: 22px; font-family: 'Segoe UI', sans-serif;
        }
        .footer span { display: flex; align-items: center; gap: 8px; }

        /* Responsive Styles For Mobile */
        @media (max-width: 800px) {
            body { padding: 10px; flex-direction: column; gap: 15px; }
            .controls { max-width: 100%; min-width: 100%; box-sizing: border-box; }
            .preview-wrapper { min-width: 100%; padding-top: 10px; justify-content: flex-start; }
            .draggable-image .resize-handle, .draggable-image .delete-btn { display: block; }
        }
    </style>
</head>

<body>

    <div class="controls">
        <h2>ফটোকার্ড জেনারেটর</h2>

        <label>সোর্স ছবি আপলোড করুন</label>
        <input type="file" id="imgUpload" accept="image/*" multiple>
        <span class="help-text">💡 <b>একাধিক ছবি</b> সিলেক্ট করতে পারবেন। ছবির উপর ক্লিক/টাচ করে টেনে পজিশন ঠিক করুন এবং যেকোনো কোণায় ধরে ছোট-বড় করুন।</span>

        <label>ক্যাটেগরি</label>
        <input type="text" id="catInput" placeholder="যেমন: ডিজিটাল ইনভেস্টিগেশন">

        <label>তারিখ</label>
        <input type="text" id="dateInput" placeholder="এভাবে লিখুনঃ তারিখ: ২০/০৮/২০২৩">

        <label>টাইটেল টেক্সট</label>
        <textarea id="textInput" placeholder="আজহারী ও আহমাদুল্লাহর ভিসা বাতিলের পেছনে *অস্ট্রেলিয়ার আওয়ামী সংশ্লিষ্ট নেটওয়ার্ক*"></textarea>
        <span class="help-text">💡 যে লেখা হলুদ করতে চান তার দুই পাশে * দিন। (যেমন: *হ্যালো*)</span>

        <button onclick="downloadPhotocard()">ডাউনলোড করুন</button>
    </div>

    <div class="preview-wrapper" id="previewWrapper">
        <div id="photocard">

            <div class="image-container" id="imageContainer"></div>

            <div class="middle-bar">
                <div class="category" id="catDisplay">ডিজিটাল ইনভেস্টিগেশন</div>
                <div class="logo-area">
                    <img src="logo.png">
                </div>
                <div class="date" id="dateDisplay">তারিখ: ২০/০৪/২০২৬</div>
            </div>

            <div class="text-block">
                <div class="main-text" id="textDisplay"></div>
            </div>

            <div class="footer">
                <span><img crossorigin="anonymous" src="https://img.icons8.com/?size=100&id=118467&format=png&color=FFFFFF" style="width:35px">TheDissent</span>
                <span><img crossorigin="anonymous" src="https://img.icons8.com/?size=100&id=rhvV5hIsMYPE&format=png&color=FFFFFF" style="width:35px">thedissent.news</span>
            </div>
        </div>
    </div>

    <script>
        const textInput = document.getElementById('textInput');
        const textDisplay = document.getElementById('textDisplay');
        const catInput = document.getElementById('catInput');
        const catDisplay = document.getElementById('catDisplay');
        const dateInput = document.getElementById('dateInput');
        const dateDisplay = document.getElementById('dateDisplay');
        const imgUpload = document.getElementById('imgUpload');
        const imageContainer = document.getElementById('imageContainer');
        const photocard = document.getElementById('photocard');
        const previewWrapper = document.getElementById('previewWrapper');

        let scale = 0.5;

        // Dynamic Scale to fit mobile screens
        function adjustScale() {
            const wrapperWidth = previewWrapper.clientWidth;
            if (wrapperWidth < 1080) {
                scale = wrapperWidth / 1080;
            } else {
                scale = 0.5;
            }
            photocard.style.transform = `scale(${scale})`;
            previewWrapper.style.height = `${1080 * scale}px`;
            
            if(wrapperWidth > (1080 * scale)){
               photocard.style.marginLeft = `${(wrapperWidth - (1080 * scale)) / 2}px`;
            } else {
               photocard.style.marginLeft = '0px';
            }
        }
        window.addEventListener('resize', adjustScale);
        adjustScale();

        function updateText() {
            let rawText = textInput.value;
            let formattedText = rawText.replace(/\*(.*?)\*/g, '<span class="text-yellow">$1</span>');
            formattedText = formattedText.replace(/\n/g, '<br>');
            textDisplay.innerHTML = formattedText;
        }

        textInput.addEventListener('input', updateText);
        catInput.addEventListener('input', () => catDisplay.textContent = catInput.value);
        dateInput.addEventListener('input', () => dateDisplay.textContent = dateInput.value);
        updateText();

        imgUpload.addEventListener('change', function (e) {
            const files = e.target.files;
            if (files) {
                Array.from(files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = function (event) {
                        createDraggableImage(event.target.result);
                    }
                    reader.readAsDataURL(file);
                });
            }
            this.value = '';
        });

        function createDraggableImage(src) {
            const wrapper = document.createElement('div');
            wrapper.className = 'draggable-image drag-handle';
            wrapper.style.width = '400px';
            wrapper.style.height = '400px';
            wrapper.style.left = '50px';
            wrapper.style.top = '50px';
            wrapper.style.backgroundImage = `url(${src})`;

            const handles = ['nw', 'ne', 'sw', 'se'];
            handles.forEach(pos => {
                const handle = document.createElement('div');
                handle.className = `resize-handle ${pos}`;
                wrapper.appendChild(handle);
            });

            const delBtn = document.createElement('div');
            delBtn.className = 'delete-btn';
            delBtn.innerHTML = '✕';
            delBtn.onclick = (e) => {
                e.stopPropagation(); 
                wrapper.remove();
            }

            wrapper.appendChild(delBtn);
            imageContainer.appendChild(wrapper);
        }

        // --- Touch & Mouse Event Logic ---
        let isDragging = false;
        let isResizing = false;
        let currentElement = null;
        let currentHandle = null;
        let startX, startY, initialLeft, initialTop, startW, startH;

        function getEventPos(e) {
            if (e.touches && e.touches.length > 0) {
                return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
            return { x: e.clientX, y: e.clientY };
        }

        function handleStart(e) {
            if (e.target.classList.contains('resize-handle')) {
                isResizing = true;
                currentHandle = e.target;
                currentElement = e.target.closest('.draggable-image');
                
                const pos = getEventPos(e);
                startX = pos.x;
                startY = pos.y;
                
                initialLeft = currentElement.offsetLeft;
                initialTop = currentElement.offsetTop;
                startW = currentElement.offsetWidth;
                startH = currentElement.offsetHeight;

                document.querySelectorAll('.draggable-image').forEach(el => el.style.zIndex = '1');
                currentElement.style.zIndex = '10';
                e.preventDefault();
                e.stopPropagation();
            } else if (e.target.classList.contains('drag-handle')) {
                isDragging = true;
                currentElement = e.target;
                
                const pos = getEventPos(e);
                startX = pos.x;
                startY = pos.y;
                
                initialLeft = currentElement.offsetLeft;
                initialTop = currentElement.offsetTop;

                document.querySelectorAll('.draggable-image').forEach(el => el.style.zIndex = '1');
                currentElement.style.zIndex = '10';
                e.preventDefault();
            }
        }

        function handleMove(e) {
            if (isResizing && currentElement) {
                e.preventDefault();
                const pos = getEventPos(e);
                const dx = (pos.x - startX) / scale;
                const dy = (pos.y - startY) / scale;

                let newW = startW, newH = startH, newL = initialLeft, newT = initialTop;

                if (currentHandle.classList.contains('se')) {
                    newW = startW + dx;
                    newH = startH + dy;
                } else if (currentHandle.classList.contains('sw')) {
                    newW = startW - dx;
                    newH = startH + dy;
                    newL = initialLeft + dx;
                } else if (currentHandle.classList.contains('ne')) {
                    newW = startW + dx;
                    newH = startH - dy;
                    newT = initialTop + dy;
                } else if (currentHandle.classList.contains('nw')) {
                    newW = startW - dx;
                    newH = startH - dy;
                    newL = initialLeft + dx;
                    newT = initialTop + dy;
                }

                if (newW > 50) {
                    currentElement.style.width = newW + 'px';
                    currentElement.style.left = newL + 'px';
                }
                if (newH > 50) {
                    currentElement.style.height = newH + 'px';
                    currentElement.style.top = newT + 'px';
                }
            } else if (isDragging && currentElement) {
                e.preventDefault();
                const pos = getEventPos(e);
                const dx = (pos.x - startX) / scale;
                const dy = (pos.y - startY) / scale;
                currentElement.style.left = (initialLeft + dx) + 'px';
                currentElement.style.top = (initialTop + dy) + 'px';
            }
        }

        function handleEnd() {
            isDragging = false;
            isResizing = false;
            currentElement = null;
            currentHandle = null;
        }

        document.addEventListener('mousedown', handleStart, { passive: false });
        document.addEventListener('mousemove', handleMove, { passive: false });
        document.addEventListener('mouseup', handleEnd);
        
        document.addEventListener('touchstart', handleStart, { passive: false });
        document.addEventListener('touchmove', handleMove, { passive: false });
        document.addEventListener('touchend', handleEnd);

        function downloadPhotocard() {
            const originalTransform = photocard.style.transform;
            const originalMargin = photocard.style.marginLeft;

            photocard.style.transform = 'none';
            photocard.style.marginLeft = '0px';
            photocard.classList.add('exporting');

            html2canvas(photocard, {
                scale: 2,
                useCORS: true,
                allowTaint: true,
                backgroundColor: '#2b2b2d'
            }).then(canvas => {
                photocard.style.transform = originalTransform;
                photocard.style.marginLeft = originalMargin;
                photocard.classList.remove('exporting');

                const link = document.createElement('a');
                link.download = `TheDissent_Photocard_${new Date().getTime()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
    </script>
</body>
</html>
